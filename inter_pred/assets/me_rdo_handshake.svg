<svg viewBox="0 0 850 350" width="100%" height="auto" xmlns="http://www.w3.org/2000/svg" style="background-color: #ffffff; border-radius: 8px; border: 1px solid #e2e8f0; font-family: sans-serif;">
    <defs>
        <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#64748b" />
        </marker>
        <marker id="arrowhead-blue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6" />
        </marker>
        <marker id="arrowhead-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#10b981" />
        </marker>
        
        <linearGradient id="meGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#eff6ff" />
            <stop offset="100%" stop-color="#dbeafe" />
        </linearGradient>
        <linearGradient id="rdoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#ecfdf5" />
            <stop offset="100%" stop-color="#d1fae5" />
        </linearGradient>
        <linearGradient id="fifoGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#f8fafc" />
            <stop offset="50%" stop-color="#f1f5f9" />
            <stop offset="100%" stop-color="#f8fafc" />
        </linearGradient>
    </defs>

    <!-- Title -->
    <text x="425" y="30" font-size="16" font-weight="bold" fill="#334155" text-anchor="middle">Inter Pred 与 RDO 决策握手架构 (初试 vs 终面)</text>

    <!-- Left Box: Inter Pred (ME) -->
    <g transform="translate(30, 60)">
        <rect x="0" y="0" width="260" height="260" fill="url(#meGrad)" rx="8" stroke="#93c5fd" stroke-width="2"/>
        <rect x="0" y="0" width="260" height="40" fill="#3b82f6" rx="8"/>
        <rect x="0" y="20" width="260" height="20" fill="#3b82f6"/> <!-- square bottom -->
        <text x="130" y="25" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">Inter Pred 引擎 (初试官)</text>
        
        <!-- Inside ME -->
        <text x="130" y="65" font-size="12" font-weight="bold" fill="#1e3a8a" text-anchor="middle">多级精搜 (基于 MVP 的有限网格)</text>
        <text x="130" y="85" font-size="11" fill="#475569" text-anchor="middle">代价计算: 估算 SATD + 简单 Bits</text>
        
        <!-- Block arrow downward -->
        <polygon points="126,95 134,95 134,107 138,107 130,115 122,107 126,107" fill="#3b82f6"/>
        
        <!-- Top 3 Filter -->
        <rect x="40" y="120" width="180" height="30" fill="#bfdbfe" rx="4" stroke="#60a5fa" stroke-width="1"/>
        <text x="130" y="140" font-size="12" font-weight="bold" fill="#1e40af" text-anchor="middle">精细筛选 (降维推荐)</text>
        
        <!-- Block arrow downward -->
        <polygon points="126,155 134,155 134,162 138,162 130,170 122,162 126,162" fill="#3b82f6"/>
        
        <!-- 3 Candidates -->
        <rect x="20" y="175" width="220" height="65" fill="#ffffff" rx="4" stroke="#93c5fd" stroke-width="1" stroke-dasharray="4,4"/>
        <text x="130" y="195" font-size="12" font-weight="bold" fill="#0369a1" text-anchor="middle">输出：3 组精英候选 MV</text>
        <text x="130" y="215" font-size="11" fill="#334155" text-anchor="middle">1. L0 最优 | 2. L1 最优 | 3. Bi-pred 提纯</text>
    </g>

    <!-- Middle: Handshake -->
    <g transform="translate(320, 160)">
        <rect x="0" y="0" width="180" height="80" fill="url(#fifoGrad)" rx="6" stroke="#cbd5e1" stroke-width="2"/>
        <text x="90" y="30" font-size="13" font-weight="bold" fill="#475569" text-anchor="middle">硬件握手 (Handshake)</text>
        <text x="90" y="50" font-size="11" fill="#64748b" text-anchor="middle">FIFO / 共享 SRAM 数据透传</text>
        <text x="90" y="68" font-size="10" fill="#64748b" text-anchor="middle">(严格单向传递)</text>
        
        <!-- Elegant thick block arrows pointing horizontally -->
        <polygon points="-30,35 -10,35 -10,28 0,40 -10,52 -10,45 -30,45" fill="#64748b"/>
        <polygon points="180,35 200,35 200,28 210,40 200,52 200,45 180,45" fill="#64748b"/>
    </g>

    <!-- Right Box: RDO -->
    <g transform="translate(530, 60)">
        <rect x="0" y="0" width="290" height="260" fill="url(#rdoGrad)" rx="8" stroke="#6ee7b7" stroke-width="2"/>
        <rect x="0" y="0" width="290" height="40" fill="#10b981" rx="8"/>
        <rect x="0" y="20" width="290" height="20" fill="#10b981"/> <!-- square bottom -->
        <text x="145" y="25" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">RDO 终极裁决模块 (终面大老板)</text>
        
        <!-- Inside RDO -->
        <text x="145" y="65" font-size="12" font-weight="bold" fill="#065f46" text-anchor="middle">接收 3 组候选，启动最昂贵计算</text>
        <text x="145" y="85" font-size="11" fill="#475569" text-anchor="middle">代价计算: 真实 DCT -> Quant -> CABAC</text>
        
        <polygon points="141,95 149,95 149,107 153,107 145,115 137,107 141,107" fill="#10b981"/>
        
        <!-- Cost comparison -->
        <rect x="40" y="120" width="210" height="45" fill="#a7f3d0" rx="4" stroke="#34d399" stroke-width="1"/>
        <text x="145" y="137" font-size="12" font-weight="bold" fill="#047857" text-anchor="middle">真实 RD Cost = SSD + λ·Real_Bits</text>
        <text x="145" y="155" font-size="11" fill="#064e3b" text-anchor="middle">对 3 个候选进行残酷比较</text>

        <polygon points="141,170 149,170 149,182 153,182 145,190 137,182 141,182" fill="#10b981"/>
        
        <!-- Winner -->
        <rect x="60" y="195" width="170" height="45" fill="#ffffff" rx="6" stroke="#059669" stroke-width="3"/>
        <text x="145" y="215" font-size="13" font-weight="bold" fill="#16a34a" text-anchor="middle">🏆 最终 Best MV</text>
        <text x="145" y="233" font-size="11" fill="#475569" text-anchor="middle">写入码流的唯一胜利者</text>
    </g>

</svg>
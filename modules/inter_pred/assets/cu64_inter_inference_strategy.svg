<svg viewBox="0 0 1000 650" width="100%" height="auto" xmlns="http://www.w3.org/2000/svg" style="background-color: #f8fafc; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;">
    <defs>
        <style>
            .title-bar { fill: #0ea5e9; }
            .title-text { font-size: 18px; font-weight: bold; fill: #0f172a; }
            .subtitle { font-size: 14px; fill: #64748b; font-style: italic; }
            .box-outline { fill: none; stroke: #cbd5e1; stroke-width: 2; rx: 6; }
            .box-dashed { fill: none; stroke: #cbd5e1; stroke-width: 2; stroke-dasharray: 6,6; rx: 6; }
            .me-block { fill: #e0f2fe; stroke: #38bdf8; stroke-width: 1; stroke-dasharray: 4,4; }
            .text-me { font-size: 11px; font-weight: bold; fill: #0369a1; text-anchor: middle; alignment-baseline: middle; }
            .avg-box { fill: #bae6fd; stroke: #0284c7; stroke-width: 2; rx: 12; }
            .text-avg { font-size: 13px; font-weight: bold; fill: #0c4a6e; text-anchor: middle; alignment-baseline: middle; }
            .label { font-size: 16px; font-weight: bold; fill: #334155; text-anchor: middle; }
        </style>
    </defs>

    <!-- LUMA SECTION -->
    <g transform="translate(40, 40)">
        <rect x="0" y="0" width="6" height="24" class="title-bar" fill="#0ea5e9"/>
        <text x="15" y="18" class="title-text">Inter 预测 CU64 (及 MTT) MV 均值推导策略图解 (Average Inference)</text>
        
        <rect x="0" y="40" width="920" height="500" fill="#ffffff" stroke="#e2e8f0" stroke-width="1" rx="12"/>

        <text x="460" y="70" class="subtitle" text-anchor="middle">核心原则：所有 32x32 均执行完整 ME 搜索，上层大块按覆盖区域的 32x32 结果取平均值</text>

        <!-- 无切分 (Full 64x64) -->
        <g transform="translate(60, 110)">
            <text x="100" y="-15" class="label">无切分 (Full 64x64)</text>
            <rect x="0" y="0" width="200" height="200" class="box-dashed"/>
            
            <rect x="5" y="5" width="90" height="90" class="me-block" rx="4"/>
            <text x="50" y="25" class="text-me">ME 32x32</text>
            <rect x="105" y="5" width="90" height="90" class="me-block" rx="4"/>
            <text x="150" y="25" class="text-me">ME 32x32</text>
            <rect x="5" y="105" width="90" height="90" class="me-block" rx="4"/>
            <text x="50" y="175" class="text-me">ME 32x32</text>
            <rect x="105" y="105" width="90" height="90" class="me-block" rx="4"/>
            <text x="150" y="175" class="text-me">ME 32x32</text>

            <rect x="50" y="85" width="100" height="30" class="avg-box"/>
            <text x="100" y="100" class="text-avg">Average (4)</text>
            <text x="100" y="230" class="subtitle" text-anchor="middle">汇聚 4 个 32x32 结果</text>
        </g>

        <!-- 二叉树水平 (BT HOR) -->
        <g transform="translate(360, 110)">
            <text x="100" y="-15" class="label">二叉树水平 (BT HOR)</text>
            <rect x="0" y="0" width="200" height="200" class="box-outline"/>
            <line x1="0" y1="100" x2="200" y2="100" stroke="#cbd5e1" stroke-width="3"/>
            
            <!-- Top Half -->
            <rect x="5" y="5" width="90" height="90" class="me-block" rx="4"/>
            <text x="50" y="25" class="text-me">ME 32x32</text>
            <rect x="105" y="5" width="90" height="90" class="me-block" rx="4"/>
            <text x="150" y="25" class="text-me">ME 32x32</text>
            <rect x="50" y="50" width="100" height="30" class="avg-box"/>
            <text x="100" y="65" class="text-avg">Average (2)</text>

            <!-- Bottom Half -->
            <rect x="5" y="105" width="90" height="90" class="me-block" rx="4"/>
            <text x="50" y="175" class="text-me">ME 32x32</text>
            <rect x="105" y="105" width="90" height="90" class="me-block" rx="4"/>
            <text x="150" y="175" class="text-me">ME 32x32</text>
            <rect x="50" y="120" width="100" height="30" class="avg-box"/>
            <text x="100" y="135" class="text-avg">Average (2)</text>
        </g>

        <!-- 三叉树水平 (TT HOR) -->
        <g transform="translate(660, 110)">
            <text x="100" y="-15" class="label">三叉树水平 (TT HOR)</text>
            <rect x="0" y="0" width="200" height="200" class="box-outline"/>
            <line x1="0" y1="50" x2="200" y2="50" stroke="#cbd5e1" stroke-width="3"/>
            <line x1="0" y1="150" x2="200" y2="150" stroke="#cbd5e1" stroke-width="3"/>
            
            <!-- Top 1/4 -->
            <rect x="5" y="5" width="90" height="40" class="me-block" rx="4"/>
            <text x="50" y="15" class="text-me" font-size="10">ME 32x32</text>
            <rect x="105" y="5" width="90" height="40" class="me-block" rx="4"/>
            <text x="150" y="15" class="text-me" font-size="10">ME 32x32</text>
            <rect x="50" y="20" width="100" height="25" class="avg-box" rx="8"/>
            <text x="100" y="32" class="text-avg" font-size="11">Average (2)</text>

            <!-- Middle 1/2 -->
            <rect x="5" y="55" width="90" height="90" class="me-block" rx="4"/>
            <text x="50" y="75" class="text-me">ME 32x32</text>
            <rect x="105" y="55" width="90" height="90" class="me-block" rx="4"/>
            <text x="150" y="75" class="text-me">ME 32x32</text>
            <rect x="50" y="100" width="100" height="30" class="avg-box"/>
            <text x="100" y="115" class="text-avg">Average (4)</text>

            <!-- Bottom 1/4 -->
            <rect x="5" y="155" width="90" height="40" class="me-block" rx="4"/>
            <text x="50" y="185" class="text-me" font-size="10">ME 32x32</text>
            <rect x="105" y="155" width="90" height="40" class="me-block" rx="4"/>
            <text x="150" y="185" class="text-me" font-size="10">ME 32x32</text>
            <rect x="50" y="155" width="100" height="25" class="avg-box" rx="8"/>
            <text x="100" y="167" class="text-avg" font-size="11">Average (2)</text>
        </g>

        <!-- 二叉树垂直 (BT VER) -->
        <g transform="translate(360, 360)">
            <text x="100" y="-15" class="label">二叉树垂直 (BT VER)</text>
            <rect x="0" y="0" width="200" height="200" class="box-outline"/>
            <line x1="100" y1="0" x2="100" y2="200" stroke="#cbd5e1" stroke-width="3"/>
            
            <!-- Left Half -->
            <rect x="5" y="5" width="90" height="90" class="me-block" rx="4"/>
            <text x="25" y="50" class="text-me" writing-mode="vertical-rl">ME 32x32</text>
            <rect x="5" y="105" width="90" height="90" class="me-block" rx="4"/>
            <text x="25" y="150" class="text-me" writing-mode="vertical-rl">ME 32x32</text>
            <!-- Vertical Average Box -->
            <rect x="50" y="60" width="30" height="80" class="avg-box" rx="6"/>
            <text x="65" y="100" class="text-avg" writing-mode="vertical-rl">Avg (2)</text>

            <!-- Right Half -->
            <rect x="105" y="5" width="90" height="90" class="me-block" rx="4"/>
            <text x="175" y="50" class="text-me" writing-mode="vertical-rl">ME 32x32</text>
            <rect x="105" y="105" width="90" height="90" class="me-block" rx="4"/>
            <text x="175" y="150" class="text-me" writing-mode="vertical-rl">ME 32x32</text>
            <rect x="120" y="60" width="30" height="80" class="avg-box" rx="6"/>
            <text x="135" y="100" class="text-avg" writing-mode="vertical-rl">Avg (2)</text>
        </g>

        <!-- 三叉树垂直 (TT VER) -->
        <g transform="translate(660, 360)">
            <text x="100" y="-15" class="label">三叉树垂直 (TT VER)</text>
            <rect x="0" y="0" width="200" height="200" class="box-outline"/>
            <line x1="50" y1="0" x2="50" y2="200" stroke="#cbd5e1" stroke-width="3"/>
            <line x1="150" y1="0" x2="150" y2="200" stroke="#cbd5e1" stroke-width="3"/>
            
            <!-- Left 1/4 -->
            <rect x="5" y="5" width="40" height="90" class="me-block" rx="4"/>
            <text x="12" y="50" class="text-me" font-size="9" writing-mode="vertical-rl">ME 32x32</text>
            <rect x="5" y="105" width="40" height="90" class="me-block" rx="4"/>
            <text x="12" y="150" class="text-me" font-size="9" writing-mode="vertical-rl">ME 32x32</text>
            <rect x="20" y="60" width="22" height="80" class="avg-box" rx="6"/>
            <text x="31" y="100" class="text-avg" font-size="10" writing-mode="vertical-rl">Avg(2)</text>

            <!-- Middle 1/2 -->
            <rect x="55" y="5" width="90" height="90" class="me-block" rx="4"/>
            <text x="70" y="50" class="text-me" writing-mode="vertical-rl">ME 32x32</text>
            <rect x="55" y="105" width="90" height="90" class="me-block" rx="4"/>
            <text x="70" y="150" class="text-me" writing-mode="vertical-rl">ME 32x32</text>
            <rect x="100" y="60" width="30" height="80" class="avg-box" rx="6"/>
            <text x="115" y="100" class="text-avg" writing-mode="vertical-rl">Avg (4)</text>

            <!-- Right 1/4 -->
            <rect x="155" y="5" width="40" height="90" class="me-block" rx="4"/>
            <text x="188" y="50" class="text-me" font-size="9" writing-mode="vertical-rl">ME 32x32</text>
            <rect x="155" y="105" width="40" height="90" class="me-block" rx="4"/>
            <text x="188" y="150" class="text-me" font-size="9" writing-mode="vertical-rl">ME 32x32</text>
            <rect x="158" y="60" width="22" height="80" class="avg-box" rx="6"/>
            <text x="169" y="100" class="text-avg" font-size="10" writing-mode="vertical-rl">Avg(2)</text>
        </g>
    </g>

</svg>
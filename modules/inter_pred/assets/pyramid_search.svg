<svg viewBox="0 0 800 220" width="100%" height="auto" xmlns="http://www.w3.org/2000/svg" style="background-color: #ffffff; border-radius: 8px; border: 1px solid #e2e8f0; font-family: sans-serif;">
    <defs>
        <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6" />
        </marker>
        <marker id="arrowhead-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
            <polygon points="0 0, 10 3.5, 0 7" fill="#ef4444" />
        </marker>
    </defs>

    <!-- Title -->
    <text x="400" y="25" font-size="15" font-weight="bold" fill="#334155" text-anchor="middle">多级特定精度金字塔搜索 (Pyramid / Greedy Search)</text>

    <!-- Stage 1: Integer Pel -->
    <g transform="translate(60, 60)">
        <rect x="0" y="0" width="160" height="110" fill="#f1f5f9" rx="6" stroke="#cbd5e1" stroke-width="2"/>
        <text x="80" y="25" font-size="13" font-weight="bold" fill="#475569" text-anchor="middle">1. 整像素粗搜 (Int-Pel)</text>
        <!-- 3x3 Grid Dots -->
        <circle cx="50" cy="50" r="4" fill="#94a3b8"/>
        <circle cx="80" cy="50" r="4" fill="#94a3b8"/>
        <circle cx="110" cy="50" r="4" fill="#94a3b8"/>
        <circle cx="50" cy="70" r="4" fill="#94a3b8"/>
        <circle cx="80" cy="70" r="6" fill="#10b981"/> <!-- Winner -->
        <circle cx="110" cy="70" r="4" fill="#94a3b8"/>
        <circle cx="50" cy="90" r="4" fill="#94a3b8"/>
        <circle cx="80" cy="90" r="4" fill="#94a3b8"/>
        <circle cx="110" cy="90" r="4" fill="#94a3b8"/>
        <text x="80" y="105" font-size="10" fill="#10b981" font-weight="bold" text-anchor="middle">最优 Int-MV</text>
    </g>

    <!-- Arrow 1 -->
    <path d="M 230 115 L 295 115" stroke="#3b82f6" stroke-width="3" stroke-dasharray="5,5" fill="none" marker-end="url(#arrowhead)"/>
    <text x="262" y="105" font-size="11" fill="#3b82f6" font-weight="bold" text-anchor="middle">继承中心</text>

    <!-- Stage 2: Half Pel -->
    <g transform="translate(320, 60)">
        <rect x="0" y="0" width="160" height="110" fill="#e0f2fe" rx="6" stroke="#bae6fd" stroke-width="2"/>
        <text x="80" y="25" font-size="13" font-weight="bold" fill="#0369a1" text-anchor="middle">2. 半像素精搜 (Half-Pel)</text>
        <!-- Grid -->
        <circle cx="50" cy="50" r="3" fill="#7dd3fc"/>
        <circle cx="80" cy="50" r="3" fill="#7dd3fc"/>
        <circle cx="110" cy="50" r="3" fill="#7dd3fc"/>
        <circle cx="50" cy="70" r="3" fill="#7dd3fc"/>
        <circle cx="80" cy="70" r="4" fill="#94a3b8" stroke="#10b981" stroke-width="2"/> <!-- Previous Winner as center -->
        <circle cx="110" cy="70" r="6" fill="#f59e0b"/> <!-- New Winner -->
        <circle cx="50" cy="90" r="3" fill="#7dd3fc"/>
        <circle cx="80" cy="90" r="3" fill="#7dd3fc"/>
        <circle cx="110" cy="90" r="3" fill="#7dd3fc"/>
        <text x="110" y="105" font-size="10" fill="#d97706" font-weight="bold" text-anchor="middle">最优 Half-MV</text>
    </g>

    <!-- Arrow 2 -->
    <path d="M 490 115 L 555 115" stroke="#ef4444" stroke-width="3" stroke-dasharray="5,5" fill="none" marker-end="url(#arrowhead-red)"/>
    <text x="522" y="105" font-size="11" fill="#ef4444" font-weight="bold" text-anchor="middle">再次继承</text>

    <!-- Stage 3: Quarter Pel -->
    <g transform="translate(580, 60)">
        <rect x="0" y="0" width="160" height="110" fill="#fef2f2" rx="6" stroke="#fecaca" stroke-width="2"/>
        <text x="80" y="25" font-size="13" font-weight="bold" fill="#b91c1c" text-anchor="middle">3. 1/4像素精搜 (Q-Pel)</text>
        <circle cx="50" cy="50" r="2" fill="#fca5a5"/>
        <circle cx="80" cy="50" r="2" fill="#fca5a5"/>
        <circle cx="110" cy="50" r="6" fill="#8b5cf6"/> <!-- New Winner -->
        <circle cx="50" cy="70" r="2" fill="#fca5a5"/>
        <circle cx="80" cy="70" r="4" fill="#94a3b8" stroke="#f59e0b" stroke-width="2"/> <!-- Previous Winner -->
        <circle cx="110" cy="70" r="2" fill="#fca5a5"/>
        <circle cx="50" cy="90" r="2" fill="#fca5a5"/>
        <circle cx="80" cy="90" r="2" fill="#fca5a5"/>
        <circle cx="110" cy="90" r="2" fill="#fca5a5"/>
        <text x="110" y="105" font-size="10" fill="#7c3aed" font-weight="bold" text-anchor="middle">最终最优 Q-MV</text>
    </g>

    <text x="400" y="200" font-size="12" fill="#64748b" text-anchor="middle">【贪心机制】：由于每一级精搜的“搜索网格中心”都死死绑定在上一级算出的最优点上，因此底层必须缓存特定层级的 fracMvCtx。</text>

</svg>